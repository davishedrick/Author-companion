<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Author Engine | Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="auth-eyebrow">The Author Engine</p>
      <h1>Reset your password</h1>
      <p class="auth-copy">
        Enter the email address for your account and we’ll send you a verification link to choose a new password.
      </p>

      {% if error %}
      <p class="auth-error" role="alert">{{ error }}</p>
      {% endif %}
      {% if notice %}
      <p class="auth-success" role="status">{{ notice }}</p>
      {% endif %}

      <form method="post" class="auth-form">
        <label>Email
          <input type="email" name="email" autocomplete="email" value="{{ email }}" required />
        </label>
        <button class="primary-btn auth-submit" type="submit" {% if setup_mode %}disabled{% endif %}>
          Send reset link
        </button>
      </form>

      <p class="auth-link-row">
        <a href="{{ url_for('login') }}">Back to sign in</a>
      </p>
    </section>
  </main>
</body>
</html>
