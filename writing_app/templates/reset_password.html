<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Author Engine | Choose New Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="auth-eyebrow">The Author Engine</p>
      <h1>Choose a new password</h1>
      <p class="auth-copy">
        Set a new password for your workspace account. Once you save it, the reset link will stop working.
      </p>

      {% if error %}
      <p class="auth-error" role="alert">{{ error }}</p>
      {% endif %}

      {% if token_valid %}
      <form method="post" class="auth-form">
        <label>New password
          <input type="password" name="password" autocomplete="new-password" required />
        </label>
        <label>Confirm new password
          <input type="password" name="confirm_password" autocomplete="new-password" required />
        </label>
        <button class="primary-btn auth-submit" type="submit">
          Save new password
        </button>
      </form>
      {% else %}
      <p class="auth-supporting-copy">
        Request a fresh reset link to continue.
      </p>
      {% endif %}

      <p class="auth-link-row">
        <a href="{{ url_for('forgot_password') }}">Request another reset link</a>
      </p>
    </section>
  </main>
</body>
</html>
